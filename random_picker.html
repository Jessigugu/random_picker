<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機點名系統 (固定大小版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .wrapper {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        /* 左邊：抽籤主畫面的卡片 (大小固定) */
        .main-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 450px;  /* 強制固定寬度 */
            height: 500px; /* 強制固定高度 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 讓內容在固定的框框內上下置中 */
        }

        /* 右邊：紀錄列表的卡片 (大小固定) */
        .history-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 350px;  /* 強制固定寬度 */
            height: 500px; /* 強制固定高度 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .result {
            font-size: 32px;
            font-weight: bold;
            color: #1a73e8;
            margin: 30px 0;
            flex-grow: 1; /* 讓結果文字佔據剩餘空間，確保按鈕能在底部 */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s;
            width: 100%;
            margin-top: auto; /* 將按鈕推到框框最下方 */
        }

        button:hover {
            background-color: #1557b0;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .history-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            overflow-y: auto; /* 內容超過固定高度時，顯示上下卷軸 */
            flex-grow: 1;
        }

        .history-list li {
            background-color: #f8f9fa;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid #34a853;
            font-size: 16px;
            color: #444;
        }

        .stats {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-align: right;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        
        /* 美化一下右邊紀錄框框內的卷軸 */
        .history-list::-webkit-scrollbar {
            width: 8px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        .history-list::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }
    </style>
</head>
<body>

        const historyList = document.getElementById("historyList");

    }
